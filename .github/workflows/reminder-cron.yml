name: Reminder Cron

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  trigger-reminders:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger reminder endpoint
        env:
          REMINDER_CRON_URL: ${{ secrets.REMINDER_CRON_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail

          if [ -z "${REMINDER_CRON_URL:-}" ]; then
            echo "REMINDER_CRON_URL secret is not set."
            exit 1
          fi

          if [ -z "${CRON_SECRET:-}" ]; then
            echo "CRON_SECRET secret is not set."
            exit 1
          fi

          response_file="$(mktemp)"
          status_code="$(
            curl -sS --max-time 30 \
              -o "$response_file" \
              -w "%{http_code}" \
              -H "Authorization: Bearer ${CRON_SECRET}" \
              -H "Accept: application/json" \
              "$REMINDER_CRON_URL"
          )"

          echo "HTTP status: $status_code"
          echo "Response body:"
          cat "$response_file"

          if [ "$status_code" -lt 200 ] || [ "$status_code" -ge 300 ]; then
            echo "Reminder cron call failed."
            exit 1
          fi
